{% extends "base.html" %}
{% load static %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="login-card">
  <div class="text-center mb-3">
    <img src="{% static INSTITUCION_LOGO %}" style="max-height:90px;" onerror="this.style.display='none'" alt="Logo">
  </div>
  <div class="card">
    <div class="card-body p-4">
      <h4 class="text-center mb-1" style="color:var(--pesv-azul);font-weight:700;">SIGA-PESV</h4>
      <p class="text-center text-muted small mb-4">Sistema Integral de Gestión de Auditorías PESV<br>{{ INSTITUCION_DEPENDENCIA }}</p>
      {% if form.errors %}
        <div class="alert alert-danger small">Usuario o contraseña incorrectos.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-pesv w-100">Ingresar</button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</div>
{% endblock %}
